apiVersion: v1
kind: Secret
metadata:
  name: mon-api-secret
type: Opaque   # "Opaque" = données arbitraires (par opposition à kubernetes.io/tls etc.)
data:
  # Les valeurs DOIVENT être encodées en base64
  # Pour encoder : echo -n "devsecret123" | base64
  # Pour décoder : echo "ZGV2c2VjcmV0MTIz" | base64 --decode
  DB_PASSWORD: ZGV2c2VjcmV0MTIz   # = "devsecret123" en base64
