name: CI/CD Pipeline

# Déclencheur : push ou PR sur main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions pour push image sur GitHub Container Registry
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/mon-api

jobs:
  # ───────────── CI : Build + Test + Docker ─────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ───────────── CD : Déploiement Kubernetes ─────────────
  cd:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Installer kubectl
      - name: Installer kubectl
        uses: azure/setup-kubectl@v3

      # Simuler le déploiement
      - name: Simuler le déploiement Kubernetes
        run: |
          echo "🚀 Pipeline CI/CD complète !"
          echo ""
          echo " Image construite et poussée vers :"
          echo "   ghcr.io/${{ github.repository }}/mon-api:sha-${{ github.sha }}"
          echo ""
          echo " En production, ces commandes seraient exécutées sur le cluster :"
          echo "   kubectl set image deployment/mon-api-deployment \\"
          echo "     mon-api=ghcr.io/${{ github.repository }}/mon-api:sha-${{ github.sha }}"
          echo "   kubectl rollout status deployment/mon-api-deployment --timeout=120s"
          echo ""
          echo " Le tag SHA permet de tracer exactement quel commit tourne en prod."