name: CI/CD Pipeline — k3s + Tailscale

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/mon-api

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - run: |
          if [ -f test_app.py ]; then
            pytest test_app.py -v
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}

  cd:
    name: Deploy to k3s via Tailscale
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Connecter au réseau Tailscale
        uses: tailscale/github-action@v1
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Configurer kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          # On vérifie la connexion en ignorant la validation SSL du certificat
          kubectl get nodes --insecure-skip-tls-verify

      - uses: azure/setup-helm@v4

      - name: Pull secret ghcr.io
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f - --insecure-skip-tls-verify

      - name: Déployer avec Helm
        run: |
          # Utilisation de --kube-insecure-skip-tls-verify pour Helm
          helm upgrade --install mon-app ./mon-api-chart \
            --set app.image.repository=ghcr.io/${{ github.repository }}/mon-api \
            --set app.image.tag=sha-${{ github.sha }} \
            --set app.image.pullPolicy=Always \
            --set database.password=${{ secrets.DB_PASSWORD }} \
            --set ingress.enabled=false \
            --atomic \
            --timeout 5m \
            --kube-insecure-skip-tls-verify

      - name: Vérifier le déploiement
        run: |
          kubectl rollout status deployment/mon-app-deployment --timeout=120s --insecure-skip-tls-verify
          kubectl get pods --insecure-skip-tls-verify
          echo "✅ Déployé sur k3s : sha-${{ github.sha }}"
